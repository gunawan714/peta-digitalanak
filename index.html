<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Peta Perlindungan Anak Banten - Panic Button & Darurat</title>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome (ikon ceria) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #FFF9E6 0%, #FFEFD0 100%);
            padding: 16px;
            padding-bottom: 30px;
        }

        /* Container utama */
        .app-container {
            max-width: 550px;
            margin: 0 auto;
            background: rgba(255, 255, 245, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* Header ceria */
        .hero {
            background: linear-gradient(135deg, #FF9F4A, #FFB86C);
            padding: 20px 20px 16px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .hero h1 {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 0 #C13B00;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .hero p {
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 8px;
        }

        /* Peta */
        .map-container {
            margin: 16px 12px 12px 12px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
            border: 3px solid #FFD966;
        }

        #mapid {
            height: 350px;
            width: 100%;
            background: #FFFAF0;
        }

        /* Tombol panic */
        .panic-section {
            display: flex;
            justify-content: center;
            margin: 12px 16px;
        }

        .btn-panic {
            background: #E63946;
            box-shadow: 0 8px 0 #9C1E2C;
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.05s linear;
            font-family: 'Quicksand', sans-serif;
            width: 100%;
            justify-content: center;
        }

        .btn-panic:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #9C1E2C;
        }

        /* Informasi lokasi */
        .info-loc {
            text-align: center;
            font-size: 0.7rem;
            background: #FFF2D7;
            margin: 8px 16px;
            padding: 8px;
            border-radius: 50px;
            color: #B45309;
            font-weight: 600;
        }

        /* Form kronologi (awal disembunyikan) */
        .kronologi-container {
            background: white;
            border-radius: 32px;
            margin: 16px;
            padding: 20px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            display: none;
            border-left: 10px solid #FF9F4A;
        }

        .kronologi-container h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #C13B00;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .kronologi-container textarea {
            width: 100%;
            padding: 14px;
            border-radius: 24px;
            border: 2px solid #FFE0B5;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 16px;
        }

        .btn-lanjut {
            background: #FF9F4A;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            font-family: 'Quicksand', sans-serif;
            transition: 0.1s;
        }

        .btn-lanjut:active {
            transform: scale(0.97);
        }

        /* Tombol share WA (awal disembunyikan) */
        .share-wa-container {
            margin: 16px;
            display: none;
        }

        .btn-share {
            background: #25D366;
            box-shadow: 0 6px 0 #1A8C46;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: 0.05s linear;
        }

        .btn-share:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #1A8C46;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 16px;
            color: #A15100;
            background: rgba(255, 241, 184, 0.7);
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.4rem;
            }
            .btn-panic {
                font-size: 1.1rem;
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="hero">
        <h1><i class="fas fa-map-marked-alt"></i> PETA PERLINDUNGAN ANAK BANTEN</h1>
        <p><i class="fas fa-child"></i> #SahabatAnakBanten · Tekan tombol darurat jika dalam bahaya</p>
    </div>

    <!-- Peta -->
    <div class="map-container">
        <div id="mapid"></div>
    </div>

    <!-- Tombol PANIC -->
    <div class="panic-section">
        <button id="panicButton" class="btn-panic"><i class="fas fa-exclamation-triangle"></i> PANIC BUTTON 🚨</button>
    </div>
    <div class="info-loc" id="locationStatus">
        <i class="fas fa-info-circle"></i> Klik tombol merah untuk menampilkan lokasimu di peta
    </div>

    <!-- Area untuk mengisi kronologi (muncul setelah panic berhasil) -->
    <div id="kronologiBox" class="kronologi-container">
        <h3><i class="fas fa-pen-alt"></i> Jelaskan Kronologi Kejadian</h3>
        <textarea id="kronologiText" rows="4" placeholder="Contoh: Saya berada di... Pada pukul... Kejadiannya..."></textarea>
        <button id="btnLanjutKronologi" class="btn-lanjut"><i class="fas fa-arrow-right"></i> Selesai, Lanjutkan</button>
    </div>

    <!-- Tombol Share WA (muncul setelah kronologi selesai) -->
    <div id="shareContainer" class="share-wa-container">
        <button id="shareWaButton" class="btn-share"><i class="fab fa-whatsapp"></i> 📲 SHARE LOKASI & KRONOLOGI ke WA</button>
    </div>

    <div class="footer">
        <i class="fas fa-heart" style="color:#E63946;"></i> Dipersembahkan oleh Komnas Perlindungan Anak Provinsi Banten
    </div>
</div>

<script>
    // ======================== DATA 8 KABUPATEN/KOTA BANTEN ========================
    // Koordinat ibukota masing-masing (sumber: perkiraan pusat kota)
    const cities = [
        { name: "Kota Serang", lat: -6.1188, lng: 106.1502, desc: "Ibu Kota Provinsi" },
        { name: "Kabupaten Serang", lat: -6.2580, lng: 106.2190, desc: "Ibukota Ciruas" },
        { name: "Kota Cilegon", lat: -6.0121, lng: 106.0250, desc: "Kota Industri" },
        { name: "Kabupaten Pandeglang", lat: -6.3140, lng: 106.1050, desc: "Ibukota Pandeglang" },
        { name: "Kabupaten Lebak", lat: -6.5190, lng: 106.2490, desc: "Ibukota Rangkasbitung" },
        { name: "Kabupaten Tangerang", lat: -6.2660, lng: 106.4610, desc: "Ibukota Tigaraksa" },
        { name: "Kota Tangerang", lat: -6.1780, lng: 106.6310, desc: "Kota Tangerang" },
        { name: "Kota Tangerang Selatan", lat: -6.2830, lng: 106.7170, desc: "Tangsel" }
    ];

    // Inisialisasi peta (tampilkan semua Banten)
    let map = L.map('mapid').setView([-6.3, 106.2], 9.5);
    // Tile layer yang cerah (CartoDB Light)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
        subdomains: 'abcd',
        maxZoom: 18
    }).addTo(map);

    // Marker custom untuk ibukota kabupaten/kota (dengan icon ceria)
    // Gunakan icon default yang dimodifikasi dengan warna
    const defaultIcon = L.icon({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34]
    });

    // Tambahkan marker untuk setiap kota
    cities.forEach(city => {
        const marker = L.marker([city.lat, city.lng], { icon: defaultIcon }).addTo(map);
        marker.bindPopup(`
            <div style="font-family: 'Quicksand'; text-align:center;">
                <b>🏙️ ${city.name}</b><br>${city.desc}<br>
                <span style="font-size:10px;">📍 Pusat Kab/Kota Banten</span>
            </div>
        `);
    });

    // Sesuaikan batas peta agar semua marker terlihat
    const bounds = L.latLngBounds(cities.map(c => [c.lat, c.lng]));
    map.fitBounds(bounds.pad(0.2));

    // Variabel global
    let userLocationMarker = null;
    let currentLocation = null;     // { lat, lng }
    let kronologiFilled = false;    // apakah kronologi sudah diisi & disetujui

    // DOM elements
    const panicBtn = document.getElementById('panicButton');
    const locationStatusDiv = document.getElementById('locationStatus');
    const kronologiBox = document.getElementById('kronologiBox');
    const kronologiText = document.getElementById('kronologiText');
    const btnLanjut = document.getElementById('btnLanjutKronologi');
    const shareContainer = document.getElementById('shareContainer');
    const shareWaBtn = document.getElementById('shareWaButton');

    // Fungsi untuk menampilkan titik merah di lokasi HP
    function showRedMarker(lat, lng) {
        if (userLocationMarker !== null) {
            map.removeLayer(userLocationMarker);
        }
        // CircleMarker merah menyala
        userLocationMarker = L.circleMarker([lat, lng], {
            color: "#E63946",
            fillColor: "#FF4D4D",
            fillOpacity: 0.9,
            radius: 14,
            weight: 3,
            opacity: 1
        }).addTo(map);
        userLocationMarker.bindPopup(`
            <b style="color:#E63946;">🚨 LOKASI DARURAT ANDA 🚨</b><br>
            Tolong segera ceritakan kronologi kejadian di bawah.
        `).openPopup();
        // Zoom ke lokasi user
        map.flyTo([lat, lng], 13);
        return true;
    }

    // Step 1: Panic button -> ambil lokasi, tampilkan titik merah, lalu tampilkan form kronologi
    function handlePanic() {
        // Cek apakah geolocation didukung
        if (!navigator.geolocation) {
            alert("Maaf, perangkat Anda tidak mendukung GPS. Hubungi nomor darurat 08991129129.");
            return;
        }

        // Ubah tombol menjadi loading sementara
        const originalText = panicBtn.innerHTML;
        panicBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengambil lokasi...';
        panicBtn.disabled = true;

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                currentLocation = { lat, lng };
                // Tampilkan titik merah
                showRedMarker(lat, lng);
                locationStatusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Lokasi ditemukan! Silakan tulis kronologi kejadian.';
                // Sembunyikan share container jika sebelumnya muncul
                shareContainer.style.display = 'none';
                kronologiFilled = false;
                // Reset textarea
                kronologiText.value = '';
                // Tampilkan form kronologi
                kronologiBox.style.display = 'block';
                // Scroll ke form
                kronologiBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                panicBtn.innerHTML = originalText;
                panicBtn.disabled = false;
            },
            function(error) {
                let errorMsg = "Tidak dapat mengambil lokasi. Pastikan GPS aktif dan izin lokasi diberikan.";
                if (error.code === 1) errorMsg = "Izin lokasi ditolak. Silakan aktifkan izin lokasi di pengaturan browser.";
                if (error.code === 2) errorMsg = "Lokasi tidak tersedia. Coba aktifkan GPS.";
                alert(errorMsg);
                locationStatusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal ambil lokasi. Periksa izin GPS.';
                panicBtn.innerHTML = originalText;
                panicBtn.disabled = false;
            },
            {
                enableHighAccuracy: true,
                timeout: 12000,
                maximumAge: 0
            }
        );
    }

    // Step 2: Ketika user klik "Selesai, Lanjutkan" (setelah mengisi kronologi)
    function finishKronologi() {
        const kronologi = kronologiText.value.trim();
        if (kronologi === "") {
            alert("Tolong tuliskan kronologi kejadian terlebih dahulu. Agar kami bisa membantu dengan tepat.");
            return;
        }
        // Tandai bahwa kronologi sudah diisi
        kronologiFilled = true;
        // Sembunyikan form kronologi (opsional, bisa tetap terlihat tapi tombol share muncul)
        // Agar tidak membingungkan, kita bisa sembunyikan atau disable textarea
        kronologiText.disabled = true;
        btnLanjut.disabled = true;
        btnLanjut.style.opacity = "0.6";
        // Tampilkan tombol share WA
        shareContainer.style.display = 'block';
        shareContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        locationStatusDiv.innerHTML = '<i class="fas fa-info-circle"></i> ✅ Kronologi tersimpan. Klik tombol hijau untuk melaporkan ke pendamping via WhatsApp.';
    }

    // Step 3: Share ke WhatsApp dengan pesan berisi lokasi + kronologi
    function shareToWA() {
        if (!currentLocation) {
            alert("Lokasi tidak tersedia. Ulangi tekan Panic Button terlebih dahulu.");
            return;
        }
        const kronologi = kronologiText.value.trim();
        if (kronologi === "") {
            alert("Kronologi belum diisi. Mohon isi terlebih dahulu.");
            return;
        }
        const lat = currentLocation.lat;
        const lng = currentLocation.lng;
        const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
        // Format pesan untuk WhatsApp
        const message = `🚨 *LAPORAN DARURAT - PETA PERLINDUNGAN ANAK BANTEN* 🚨\n\n*Lokasi Saya:* ${mapsLink}\n(Latitude: ${lat}, Longitude: ${lng})\n\n*Kronologi Kejadian:*\n${kronologi}\n\n--\nSaya membutuhkan bantuan segera. Mohon pendampingan dari Komnas Perlindungan Anak Banten. #SahabatAnakBanten`;
        const encodedMessage = encodeURIComponent(message);
        const waNumber = "628991129129";  // 08991129129
        const waUrl = `https://wa.me/${waNumber}?text=${encodedMessage}`;
        // Buka WhatsApp (atau web WhatsApp)
        window.open(waUrl, '_blank');
        // Beri feedback
        locationStatusDiv.innerHTML = '<i class="fab fa-whatsapp"></i> ✅ Pesan telah dibuka di WhatsApp. Kirimkan untuk melaporkan.';
    }

    // Event listeners
    panicBtn.addEventListener('click', handlePanic);
    btnLanjut.addEventListener('click', finishKronologi);
    shareWaBtn.addEventListener('click', shareToWA);

    // Saat halaman dimuat, pastikan form kronologi dan share tidak terlihat
    kronologiBox.style.display = 'none';
    shareContainer.style.display = 'none';

    // Opsional: resize map jika ada perubahan orientasi
    window.addEventListener('resize', function() {
        setTimeout(function() {
            map.invalidateSize();
        }, 200);
    });
</script>
</body>
</html>
